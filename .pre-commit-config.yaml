# .pre-commit-config.yaml
# Pre-commit hooks for Distributed AI Demo.
# Uses Ruff for linting and auto-formatting.
# Long lines (E501) are ignored to allow documentation docstrings.

# **********************************************************
# *** IMPORTANT:                                         ***
# *** Run the following commands, to ensure that:        ***
# *** 1) The pre-commit hooks are installed for commits: ***
# ***    pre-commit install --install-hooks              ***
# *** 2) The pre-push hook is installed and active:      ***
# ***    pre-commit install --hook-type pre-push         ***
# **********************************************************

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      # Ruff linting hook
      - id: ruff
        args: ["--ignore=E501"]  # Ignore long lines (E501) so docstrings or Markdown lines don't block commits.
        additional_dependencies: []  # May later add extra packages if needed.

      # Ruff formatting hook (auto-fixes style issues)
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Optional: automatically remove trailing whitespace in all files
      - id: trailing-whitespace

  # Optional: normalize line endings to LF
      - id: end-of-file-fixer

  - repo: local  # This is a local hook (not pulled from GitHub).
    hooks:
      - id: django-tests  # Unique identifier for the hook.
        name: Run Django tests before push
        entry: hooks/run-tests.sh  # Path to the shell script to execute.
        language: script  # A simple shell script.
        stages: [push]  # Run this only before git push.
