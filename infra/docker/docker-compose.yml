###############################################################################
# Suspicious Email Triage - Docker Compose
#
# PURPOSE:
# This file defines the full local development / containerized runtime
# environment for the Suspicious Email Triage system.
#
# ARCHITECTURE OVERVIEW:
#
#   frontend (external / React dev server)
#          ↓ HTTP
#   backend (Express API)
#          ↓
#   Redis (BullMQ queue)
#          ↓
#   worker (async analysis engine)
#          ↓
#   MongoDB (persistent storage)
#
# DESIGN GOALS:
# - Fully decoupled async processing (API vs worker)
# - Scalable background job architecture (BullMQ)
# - Stateless API container
# - Persistent database + queue separation
###############################################################################

services:

  #############################################################################
  # MongoDB - Primary Data Store
  #
  # ROLE:
  # - stores all email reviews
  # - stores analysis results
  # - stores analyst overrides
  #
  # NOTES:
  # - runs as standalone container
  # - exposed locally for debugging (27018 on host → 27017 in container)
  #############################################################################
  mongo:
    container_name: triage-mongo
    image: mongo:6
    ports:
      - "27018:27017"
    restart: unless-stopped

  #############################################################################
  # Redis - Queue Backend (BullMQ)
  #
  # ROLE:
  # - stores job queue for async processing
  # - acts as broker between API and worker
  #
  # FLOW:
  # backend → Redis queue → worker consumes jobs
  #############################################################################
  redis:
    container_name: triage-redis
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

  #############################################################################
  # Backend API (Express Server)
  #
  # ROLE:
  # - exposes REST API (/reviews, /test, /override)
  # - writes to MongoDB
  # - enqueues jobs into Redis queue
  #
  # DEPENDENCIES:
  # - mongo (data persistence)
  # - redis (job queue)
  #############################################################################
  backend:
    container_name: triage-backend
    build:
      context: ../../
      dockerfile: backend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  #############################################################################
  # Worker (Async Analysis Engine)
  #
  # ROLE:
  # - consumes jobs from Redis queue
  # - runs analysis logic (rules / ML / heuristics)
  # - updates MongoDB with results
  #
  # DESIGN:
  # - fully decoupled from HTTP layer
  # - can be horizontally scaled independently
  #############################################################################
  worker:
    container_name: triage-worker
    build:
      context: ../../
      dockerfile: backend/Dockerfile.worker
    depends_on:
      - mongo
      - redis
    restart: unless-stopped
