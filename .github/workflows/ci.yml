# .github/workflows/ci.yml — Fully Documented CI Pipeline
#
# This file defines the initial CI pipeline (safe-start).
# It will evolve into a full distributed pipeline.
#
# See:
# docs/ci_pipeline_architecture_distributed_ai_demo.md

###############################################################################
# CI PIPELINE — DISTRIBUTED AI DEMO
#
# Safe-start version.
#
# Purpose:
# - Validate repository integrity
# - Ensure dependencies install correctly
# - Run Django tests in isolation
#
# Future extensions:
# - Lint / format / type-check (parallel jobs)
# - PostgreSQL service
# - Redis + Celery
# - Kafka
# - End-to-end tests
# - Docker build
###############################################################################

name: CI

###############################################################################
# TRIGGERS
###############################################################################
on:
  push:
    branches: [ main ]
    # Run CI on every push to main

  pull_request:
    branches: [ main ]
    # Run CI on PRs before merge

###############################################################################
# JOBS
###############################################################################
jobs:

  settings-check:
    name: Settings Validation
    runs-on: ubuntu-latest

    # ------------------------------------------------------------------
    # PURPOSE
    # ------------------------------------------------------------------
    # This job verifies that Django settings are correctly resolved
    # for ALL supported environments: dev, staging, and prod.
    #
    # It ensures:
    # - The correct settings module is loaded (backend.config.settings)
    # - ENVIRONMENT switching works (via ENVIRONMENT env var)
    # - dev uses DEBUG=True
    # - staging/prod use DEBUG=False
    # - ALLOWED_HOSTS is valid
    #
    # It matters, because without it:
    # - Misconfigured settings may only fail at runtime
    # - Production may accidentally run with DEBUG=True (critical risk)
    # - CI could pass while deployment is broken
    #
    # This job FAILS FAST before any tests or builds.

    steps:

      # ------------------------------------------------------------------
      # Checkout repository
      # ------------------------------------------------------------------
      # actions/checkout@v4 is an official GitHub Action that:
      # - Initializes the CI workspace with project code: Clones the repository into the CI runner
      # - Makes all project files available to subsequent steps
      # Version v4, the latest stable major version, includes performance and security improvements.
      #
      # WITHOUT THIS STEP:
      # - Docker build would fail (no source code)
      # - Scripts (e.g., check_settings.py) would not exist
      - uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Build backend image
      # ------------------------------------------------------------------
      # Builds the Docker image exactly as used in runtime and CI.
      # This guarantees:
      # - Correct PYTHONPATH (/app)
      # - Correct working directory
      # - Same environment as production containers
      #
      # Prevents "works locally but not in container" issues.
      - name: Build backend
        run: docker compose -f infra/docker/docker-compose.yml build backend

      # ------------------------------------------------------------------
      # Create <.env.dev> for CI
      # ------------------------------------------------------------------
      # Create <backend/.env.dev> dynamically as CI runners do NOT have local .env files, while the docker-compose expects "backend/.env.${ENVIRONMENT}".
      # This mirrors local development configuration.
      #
      # NOTE:
      # - Safe because values are non-sensitive (dev only)
      # - Production will use secrets instead
      - name: Create backend/.env.dev for CI
        run: |
          cat <<EOF > backend/.env.dev
ENVIRONMENT=dev

DJANGO_SECRET_KEY=dev-secret
ALLOWED_HOSTS=localhost,127.0.0.1

POSTGRES_DB=demo
POSTGRES_USER=demo
POSTGRES_PASSWORD=demo
POSTGRES_HOST=postgres
POSTGRES_PORT=5432

RABBITMQ_DEFAULT_USER=demo
RABBITMQ_DEFAULT_PASSWORD=demo
RABBITMQ_VHOST=/dev

SENTRY_ENABLED=True
SENTRY_DSN=https://c9e64c9d09cb5e6cba3507d180e373b5@o4511104766246912.ingest.us.sentry.io/4511104768933888

KAFKA_BOOTSTRAP_SERVERS=kafka:9092

CELERY_BROKER_URL=redis://redis:6379/0
CELERY_RESULT_BACKEND=redis://redis:6379/1
EOF

      # ------------------------------------------------------------------
      # Create <.env.staging> for CI
      # ------------------------------------------------------------------
      # Create <backend/.env.staging> dynamically as CI runners do NOT have local .env files, while the docker-compose expects "backend/.env.${ENVIRONMENT}".
      # This mirrors local staging configuration.
      - name: Create backend/.env.staging for CI
        run: |
          cat <<EOF > backend/.env.staging
ENVIRONMENT=staging

DJANGO_SECRET_KEY=staging-secret
ALLOWED_HOSTS=localhost,127.0.0.1

POSTGRES_DB=staging_db
POSTGRES_USER=staging_user
POSTGRES_PASSWORD=staging_secret
POSTGRES_HOST=staging-db
POSTGRES_PORT=5432

RABBITMQ_DEFAULT_USER=staging_user
RABBITMQ_DEFAULT_PASSWORD=staging_secret
RABBITMQ_VHOST=/staging

SENTRY_ENABLED=True
SENTRY_DSN=https://c9e64c9d09cb5e6cba3507d180e373b5@o4511104766246912.ingest.us.sentry.io/4511104768933888

KAFKA_BOOTSTRAP_SERVERS=kafka:9092

CELERY_BROKER_URL=redis://redis:6379/0
CELERY_RESULT_BACKEND=redis://redis:6379/1
EOF

      # ------------------------------------------------------------------
      # Validate DEV environment
      # ------------------------------------------------------------------
      # The script imports Django settings and asserts their correctness using <backend/scripts/check_settings.py>.
      #
      # Runs Django with "ENVIRONMENT=dev".
      # ENVIRONMENT is passed via GitHub Actions "env:" block since it must exist at the docker-compose evaluation time.
      # This way docker-compose correctly resolves <.env.dev>, and the CI behaves like local Docker execution.
      # It may not be passed via the docker-compose "-e" flag because our docker-compose, <infra/docker/docker-compose.yml>",
      # resolves env_file paths by itself, i.e., BEFORE container runtime, by using "../../backend/.env.${ENVIRONMENT:-dev}".
      # If passed via "-e", it is ONLY available inside the container, NOT during docker-compose parsing, what leads to "env file not found" error in CI.
      #
      # Expected: "DEBUG = True".
      - name: Validate DEV
        env:
          ENVIRONMENT: dev
        run: |
          docker compose -f infra/docker/docker-compose.yml run --rm \
          backend \
          python backend/scripts/check_settings.py

      # ------------------------------------------------------------------
      # Validate STAGING environment
      # ------------------------------------------------------------------
      # The script imports Django settings and asserts their correctness using <backend/scripts/check_settings.py>.
      #
      # Runs Django with "ENVIRONMENT=staging".
      # ENVIRONMENT is passed via GitHub Actions "env:" block since it must exist at the docker-compose evaluation time.
      # This way docker-compose correctly resolves <.env.staging>, and the CI uses the explicitly set ENVIRONMENT, does not fallback to a default value by using "../../backend/.env.${ENVIRONMENT:-dev}", and behaves like local Docker execution.
      # It is not passed via the -e flag because docker-compose, <infra/docker/docker-compose.yml>, resolves env_file paths independently at compose-parsing time (before container startup), using the expression ""../../backend/.env.${ENVIRONMENT:-dev}"" as a fallback.
      # If passed via "-e", it is ONLY available inside the container, NOT during docker-compose parsing, what leads to "env file not found" error in CI.
      #
      # Expected: "DEBUG = False".
      - name: Validate STAGING
        env:
          ENVIRONMENT: staging
        run: |
          docker compose -f infra/docker/docker-compose.yml run --rm \
          backend \
          python backend/scripts/check_settings.py

      # ------------------------------------------------------------------
      # Validate PROD environment
      # ------------------------------------------------------------------
      # The script imports Django settings and asserts their correctness using <backend/scripts/check_settings.py>.
      #
      # Runs Django with "ENVIRONMENT=prod".
      # ENVIRONMENT is passed via GitHub Actions "env:" block since it must exist at the docker-compose evaluation time.
      # This way docker-compose correctly resolves <.env.prod>, and the CI uses the explicitly set ENVIRONMENT, does not fallback to a default value by using "../../backend/.env.${ENVIRONMENT:-dev}", and behaves like local Docker execution.
      # It is not passed via the -e flag because docker-compose, <infra/docker/docker-compose.yml>, resolves env_file paths independently at compose-parsing time (before container startup), using the expression ""../../backend/.env.${ENVIRONMENT:-dev}"" as a fallback.
      # If passed via "-e", it is ONLY available inside the container, NOT during docker-compose parsing, what leads to "env file not found" error in CI.
      #
      # Expected: "DEBUG = False".
      - name: Validate PROD
        env:
          ENVIRONMENT: prod
        run: |
          docker compose -f infra/docker/docker-compose.yml run --rm \
          backend \
          python backend/scripts/check_settings.py

  tests:

    ###########################################################################
    # RUNNER
    ###########################################################################
    runs-on: ubuntu-latest
    # GitHub-hosted VM
    # - clean environment every run
    # - reproducible builds
    # - includes common tooling

    ###########################################################################
    # DEPENDENCY: settings-check
    ###########################################################################
    # This job depends on the successful completion of "settings-check".
    #
    # Meaning:
    # - This job WILL NOT RUN if settings-check fails
    # - Guarantees all environments (dev/staging/prod) are valid before continuing
    #
    # WHY:
    # - Prevents running tests/builds with broken Django configuration
    # - Avoids wasting CI time on jobs that are guaranteed to fail later
    # - Enforces "fail fast" principle in pipeline design
    #
    # EXAMPLE FAILURE PREVENTED:
    # - Wrong DJANGO_SETTINGS_MODULE
    # - DEBUG=True in production
    # - Missing env variables
    needs: settings-check

    # ###########################################################################
    # # SERVICES — POSTGRESQL
    # #
    # # GitHub Actions allows defining "service containers".
    # # These are Docker containers automatically started BEFORE steps run.
    # #
    # # They are:
    # # - network-accessible from the job
    # # - isolated per workflow run
    # # - automatically cleaned up
    # #
    # # Access pattern:
    # # - inside the job → available via "localhost:<port>"
    # ###########################################################################
    # services:
    #   postgres:
    #     image: postgres:15
    #     # Docker image used for the service
    #     #
    #     # "postgres:15":
    #     # - official PostgreSQL image
    #     # - version 15 (stable, production-grade)
    #     #
    #     # Alternatives:
    #     # - postgres:14
    #     # - postgres:latest (NOT recommended for CI stability)

    #     env:
    #       POSTGRES_DB: test_db
    #       POSTGRES_USER: postgres
    #       POSTGRES_PASSWORD: postgres
    #     # Environment variables passed INTO the container
    #     #
    #     # These configure PostgreSQL at startup:
    #     # - POSTGRES_DB        → database created automatically
    #     # - POSTGRES_USER      → default user
    #     # - POSTGRES_PASSWORD  → user password
    #     #
    #     # These values must match Django settings later

    #     ports:
    #       - 5432:5432
    #     # Port mapping:
    #     # - left side: port on CI runner
    #     # - right side: port inside container
    #     #
    #     # This allows Django to connect via:
    #     #   localhost:5432

    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #     # Health check configuration
    #     #
    #     # Problem:
    #     # - container may start BEFORE DB is ready
    #     #
    #     # Solution:
    #     # - GitHub waits until this health check passes
    #     #
    #     # pg_isready:
    #     # - built-in Postgres readiness check
    #     #
    #     # retries logic:
    #     # - tries every 10 seconds
    #     # - waits up to ~50 seconds total

    steps:

      #########################################################################
      # Checkout code
      #########################################################################
      - name: Checkout repository
        uses: actions/checkout@v4
        # Clones repository into CI runner.

      #########################################################################
      # Setup Python
      #########################################################################
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
        # Installs Python runtime + enables pip caching.

      #########################################################################
      # Install Poetry
      #########################################################################
      - name: Install Poetry
        run: pip install poetry
        # Installs dependency manager.

      #########################################################################
      # Install dependencies
      #########################################################################
      - name: Install dependencies
        run: poetry install --no-root
        # Installs Python dependencies only (not this package).

      #########################################################################
      # Build backend image
      #########################################################################
      - name: Build backend image
        run: docker compose -f infra/docker/docker-compose.yml build backend
        # Ensures Docker image exists before container-based tests.
        #
        # Required because:
        # - Tests are executed inside the container.
        # - Guarantees CI == runtime parity.

      #########################################################################
      # Run Django tests (host mode)
      #########################################################################
      - name: Run Django unit tests (host mode)
        run: poetry run env USE_SQLITE=true CELERY_EAGER=true python backend/manage.py test -v 2
        # Fast unit test execution.
        #
        # Scope:
        # - No Docker.
        # - No external services.
        # - Pure Python/Django layer tests.

      #########################################################################
      # Run Django tests (Docker mode)
      #########################################################################
      - name: Run Django integration tests (docker mode)
        run: |
          docker compose -f infra/docker/docker-compose.yml run --rm \
          -e USE_SQLITE=true \
          -e CELERY_EAGER=true \
          backend \
          python backend/manage.py test -v 2
        # Full integration execution inside container.
        #
        # Scope:
        # - Docker runtime environment.
        # - Identical to production container behavior.

  tests-celery:
    runs-on: ubuntu-latest
    # GitHub-hosted runner environment
    #
    # Purpose:
    # - Isolated job for future Celery integration tests.
    # - Ensures async task system can be validated independently.

    services:
      redis:
        image: redis:7
        # Redis service container used as broker/backend dependency for Celery.
        # Provides message broker for Celery tasks.

        ports:
          - 6379:6379
          # Exposes Redis on default port.
          #
          # Note:
          # - Makes Redis available to CI job containers via localhost.
          # - Required for Celery worker connectivity tests.

    steps:
      - name: Celery placeholder
        run: echo "Celery tests disabled until Redis integration step"
        # Placeholder step for future Celery test execution
        #
        # Purpose:
        # - Marks intentional omission of Celery test suite.
        # - Prevents CI failure while async infrastructure is still evolving.
        #
        # Future upgrade:
        # - Replace with:
        #   - Celery worker startup
        #   - task execution tests
        #   - Redis-backed queue validation
